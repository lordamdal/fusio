version: '3.8'

services:
  # NATS message broker
  nats:
    image: nats:latest
    container_name: fusio-nats
    ports:
      - "4222:4222"
      - "8222:8222"  # monitoring
    command: ["--http_port", "8222"]
    restart: unless-stopped

  # Hardhat local EVM node (optional - only needed for contract tests)
  # hardhat:
  #   build:
  #     context: ./packages/contracts
  #   container_name: fusio-hardhat
  #   ports:
  #     - "8545:8545"
  #   command: npx hardhat node
  #   restart: unless-stopped

networks:
  default:
    name: fusio-network
